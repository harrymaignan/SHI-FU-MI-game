<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <link rel="stylesheet" href="style.css" />
    <div>
      <img src="logo/logo.png" alt="" />
      <h2>SHI-FU-MI</h2>
    </div>
    <div>
      <button id="pierre" class="pierre">pierre</button>
      <button id="feuille" class="feuille">feuille</button>
      <button id="ciseaux" class="ciseaux">ciseaux</button>
    </div>

    <div class="text">
      <p id="instruction">Choisissez un coup pour commencer !</p>
      <p id="result" class="result">Résultat: </p>
    </div>
    <div class="Donee">
      <div class="div">
        <p class="vies-div">Vies</p>
        <p id="vies" class="vies">❤️❤️❤️</p>
      </div>
      <div class="div">
        <p class="score-div">Score</p>
        <p id="score" class="score-div">0</p>
      </div>
      <div class="div">
        <button id="replay" class="button">Rejouer</button>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
